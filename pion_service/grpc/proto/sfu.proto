syntax = "proto3";
package sfu;
option go_package = "ai-call-pion/grpc/proto";

service SFUService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc ProcessOffer(OfferRequest) returns (AnswerResponse);
  rpc AddIceCandidate(IceCandidateRequest) returns (Empty);
  rpc StreamAudioToPion(stream AudioChunk) returns (Empty);     // FastAPI → Pion (TTS audio)
  rpc StreamAudioFromPion(SessionID) returns (stream AudioChunk); // Pion → FastAPI (user audio)
  rpc EndSession(SessionID) returns (Empty);
}

message CreateSessionRequest { string session_id = 1; }
message CreateSessionResponse { string session_id = 1; }
message OfferRequest { string session_id = 1; string sdp = 2; }
message AnswerResponse { string sdp = 1; }
message IceCandidateRequest { string session_id = 1; string candidate_json = 2; }
message AudioChunk { string session_id = 1; bytes pcm_data = 2; int32 sample_rate = 3; }
message SessionID { string session_id = 1; }
message Empty {}
