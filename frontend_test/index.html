<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Call Test Client</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #status { margin: 1rem 0; font-weight: bold; }
        button { padding: 0.5rem 1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        .controls { margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Video Call</h1>
        <div id="status">Ready to Call</div>
        <div class="controls">
            <button id="startBtn">Start Call</button>
            <button id="stopBtn" disabled>End Call</button>
        </div>
        <audio id="aiAudio" autoplay></audio>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusDiv = document.getElementById('status');
        const aiAudio = document.getElementById('aiAudio');

        let ws, pc, localStream;
        const SESSION_ID = crypto.randomUUID();
        const API_BASE = 'http://localhost:8000';
        const WS_URL = `ws://localhost:8000/ws/signaling/${SESSION_ID}`;

        startBtn.onclick = async () => {
            try {
                statusDiv.innerText = 'Initializing...';
                startBtn.disabled = true;

                // 1. Get user media
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusDiv.innerText = 'Mic Access Granted';

                // 2. Connect signaling
                ws = new WebSocket(WS_URL);
                ws.onmessage = handleSignalingMessage;
                ws.onopen = () => {
                    statusDiv.innerText = 'Connected to Signaling';
                    initWebRTC();
                };
                ws.onclose = () => {
                    statusDiv.innerText = 'Disconnected';
                    stopCall();
                };

            } catch (err) {
                console.error(err);
                statusDiv.innerText = 'Error: ' + err.message;
                startBtn.disabled = false;
            }
        };

        stopBtn.onclick = () => stopCall();

        async function initWebRTC() {
            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:l.google.com:19302' }]
            });

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.ontrack = (event) => {
                console.log('Received remote track');
                aiAudio.srcObject = event.streams[0];
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({ type: 'ice-candidate', candidate: event.candidate }));
                }
            };

            pc.oniceconnectionstatechange = () => {
                statusDiv.innerText = 'WebRTC: ' + pc.iceConnectionState;
                if (pc.iceConnectionState === 'connected') {
                    stopBtn.disabled = false;
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
        }

        async function handleSignalingMessage(event) {
            const msg = JSON.parse(event.data);
            if (msg.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: msg.sdp }));
            } else if (msg.type === 'ice-candidate') {
                await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
            }
        }

        function stopCall() {
            if (pc) pc.close();
            if (ws) ws.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusDiv.innerText = 'Call Ended';
        }
    </script>
</body>
</html>
